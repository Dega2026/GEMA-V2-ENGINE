<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request a Quote | GEMA Global</title>
    <meta
      name="description"
      content="Request a quote from GEMA Global Medical for our products or services."
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="Request a Quote | GEMA Global" />
    <meta
      property="og:description"
      content="Request a quote from GEMA Global Medical for our products or services."
    />
    <meta property="og:image" content="/assets/images/sectors/turnkey.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="stylesheet" href="../css/all.min.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/themes.css" />
    <link rel="stylesheet" href="../css/ai-styles.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/page-content-layout.css" />
    <link rel="stylesheet" href="../css/contact-quote.css" />
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico" />
  </head>
  <body class="quote-page">
    

    <main class="content-wrapper container page-main-offset">
      <h1 class="page-title" data-i18n="q_title">
        Initialize <span>Partnership</span>
      </h1>

      <div class="gema-card quote-card">
        <p class="quote-desc" data-i18n="q_desc">
          Fill out the technical requirements below. Our engineering unit will
          respond within 24 hours.
        </p>

        <form id="quote-form" class="quote-form-grid">
          <input
            type="text"
            data-i18n-placeholder="q_ph_name"
            placeholder="Full Name"
            required
            class="quote-field"
          />
          <input
            type="email"
            data-i18n-placeholder="q_ph_email"
            placeholder="Business Email"
            required
            class="quote-field"
          />
          <input
            type="text"
            data-i18n-placeholder="q_ph_company"
            placeholder="Company Name"
            class="quote-field"
          />

          <select class="quote-field quote-select">
            <option value="" data-i18n="q_opt_sector">Select Sector</option>
            <option value="manufacturing" data-i18n="q_opt_mfg">
              Manufacturing (OEM)
            </option>
            <option value="trading" data-i18n="q_opt_trade">
              Global Trading
            </option>
            <option value="engineering" data-i18n="q_opt_eng">
              Medical Engineering
            </option>
            <option value="turnkey" data-i18n="q_opt_tk">
              Turnkey Solutions
            </option>
          </select>

          <textarea
            data-i18n-placeholder="q_ph_specs"
            placeholder="Technical Specifications / Quantity"
            rows="5"
            class="quote-field quote-wide"
          ></textarea>

          <button
            type="submit"
            class="btn-gold quote-wide quote-submit"
          >
            <span data-i18n="q_btn">SUBMIT REQUEST</span>
          </button>
        </form>
      </div>
    </main>

<script src="../js/api-config.js"></script>
<script src="../js/all.min.js"></script>
<script src="../js/translations.js"></script>
<script src="../js/sounds.js"></script>
<script src="../js/header.js"></script>
<script src="../js/footer.js"></script>
<script src="../js/main.js"></script>
  </body>
</html>
