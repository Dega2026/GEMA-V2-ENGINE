  <body class="reg-page">
    <div class="service-hero" id="hero-section">
      <div class="service-header-content">
        <span class="category-tag" id="s-tag">Service</span>
        <h1 id="s-title">Loading...</h1>
        <p id="s-subtitle"></p>
      </div>
    </div>

    <div class="service-body">
      <div class="gema-card service-overview-card">
        <h3 id="s-overview-title">Overview</h3>

          Fetching data from the Matrix...
        </p>

        <h3 id="s-benefits-title">
          Key Benefits
        </h3>

      </div>

      <div class="service-form text-center">
        <h3 id="s-request-title">Request This Service</h3>
        <form>
          <input id="s-name" type="text" placeholder="Your Name" required />
          <input id="s-email" type="email" placeholder="Business Email" required />
          <input
            type="text"
            id="s-subject"
            readonly
          />
          <button
            id="s-submit-btn"
            type="submit"
            class="btn-gold"
          >
            Submit Request
          </button>
        </form>
      </div>
    </div>
