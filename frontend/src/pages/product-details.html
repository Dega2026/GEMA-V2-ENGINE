<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GEMA | Product Details</title>
    <meta name="description" content="Detailed technical specifications for GEMA medical products, including compliance and ordering information." />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="GEMA | Product Details" />
    <meta property="og:description" content="Detailed technical specifications for GEMA medical products, including compliance and ordering information." />
    <meta property="og:image" content="/assets/images/sectors/products.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="stylesheet" href="../css/all.min.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/themes.css" />
    <link rel="stylesheet" href="../css/ai-styles.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/page-content-layout.css" />
    <link rel="stylesheet" href="../css/product-pages.css" />
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico" />
  </head>
  <body class="products-page">
    

    <main class="container content-wrapper page-main-offset" id="product-detail-container">
      <article class="product-detail-card i18n" data-key="product.card.shell">
        <div class="product-detail-hero">
          <div class="product-detail-image-wrap">
            <div id="product-image" class="card-image product-card-image"></div>
          </div>
        </div>

        <div class="product-info product-info-panel">
          <span class="category-tag i18n" id="product-category" data-key="product.category">Product Category</span>
          <h1 class="product-detail-title i18n" id="product-name" data-key="product.name">Product Name</h1>
          <p class="product-detail-desc i18n" id="product-description" data-key="product.description">Product description will be injected from MongoDB.</p>
          <p class="product-price-display" id="product-price">Price on request</p>

          <h3 class="product-specs-title i18n" data-key="product.specs_title">Technical Specifications</h3>
          <ul class="product-specs-stack">
            <li class="spec-item product-spec-item">
              <h4 class="product-spec-label"><i class="fas fa-cube"></i> <span class="i18n" data-key="product.spec_label_components">Components:</span></h4>
              <p class="product-spec-value i18n" id="spec-components" data-key="product.spec_components">-</p>
            </li>
            <li class="spec-item product-spec-item">
              <h4 class="product-spec-label"><i class="fas fa-ruler-combined"></i> <span class="i18n" data-key="product.spec_label_sizes">Sizes:</span></h4>
              <p class="product-spec-value i18n" id="spec-sizes" data-key="product.spec_sizes">-</p>
            </li>
            <li class="spec-item product-spec-item">
              <h4 class="product-spec-label"><i class="fas fa-vial"></i> <span class="i18n" data-key="product.spec_label_sterilization">Sterilization:</span></h4>
              <p class="product-spec-value i18n" id="spec-sterilization" data-key="product.spec_sterilization">-</p>
            </li>
            <li class="spec-item product-spec-item">
              <h4 class="product-spec-label"><i class="fas fa-shield-alt"></i> <span class="i18n" data-key="product.spec_label_compliance">Compliance:</span></h4>
              <p class="product-spec-value i18n" id="spec-compliance" data-key="product.spec_compliance">-</p>
            </li>
          </ul>

          <div class="action-btns product-actions-row">
            <a id="btn-request-quote" href="/quote" class="btn-gold product-order-btn i18n" data-key="product.cta_quote">REQUEST BULK PRICING</a>
            <a id="btn-download-datasheet" href="#" class="btn-gold product-datasheet-btn i18n" data-key="product.cta_datasheet" target="_blank" rel="noopener">DOWNLOAD DATA SHEET</a>
          </div>
        </div>
      </article>
    </main>

<script src="../js/api-config.js"></script>
<script src="../js/translations.js"></script>

<script src="../js/all.min.js"></script>
<script src="../js/header.js"></script>
<script src="../js/footer.js"></script>
<script src="../js/main.js"></script>
<script src="../js/product-details-page.js"></script>
  </body>
</html>
